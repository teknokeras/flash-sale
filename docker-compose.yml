services:

  # ─────────────────────────────────────────────
  # PostgreSQL — Aurora-compatible local stand-in
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: flashsale-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-flashsale}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-flashsale_secret}
      POSTGRES_DB: ${POSTGRES_DB:-flashsale}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-flashsale} -d ${POSTGRES_DB:-flashsale}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # Redis — ElastiCache-compatible local stand-in
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flashsale-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secret}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # DynamoDB Local — official AWS emulator
  # ─────────────────────────────────────────────
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: flashsale-dynamodb
    restart: unless-stopped
    # command: ["-jar", "DynamoDBLocal.jar", "-sharedDb", "-dbPath", "/home/dynamodblocal/data"]
    command: ["-jar", "DynamoDBLocal.jar", "-inMemory"]
    ports:
      - "8000:8000"
    volumes:
      - dynamodb_data:/home/dynamodblocal/data
    healthcheck:
      test: ["CMD-SHELL", "echo 'health' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # ElasticMQ — SQS FIFO-compatible local stand-in
  # ─────────────────────────────────────────────
  elasticmq:
    image: softwaremill/elasticmq-native:latest
    container_name: flashsale-elasticmq
    restart: unless-stopped
    ports:
      - "9324:9324"
      - "9325:9325"
    volumes:
      - ./infra/elasticmq/elasticmq.conf:/opt/elasticmq.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9324 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # DynamoDB table bootstrapper — runs once then exits
  # ─────────────────────────────────────────────
  dynamodb-init:
    image: amazon/aws-cli:latest
    container_name: flashsale-dynamodb-init
    restart: "no"
    depends_on:
      dynamodb:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
      AWS_DEFAULT_REGION: us-east-1
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo 'Creating DynamoDB purchases table...' &&
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name purchases \
          --attribute-definitions AttributeName=pk,AttributeType=S \
          --key-schema AttributeName=pk,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST \
          --table-class STANDARD &&
        echo 'Creating DynamoDB idempotency table...' &&
        aws dynamodb create-table \
          --endpoint-url http://dynamodb:8000 \
          --table-name idempotency_keys \
          --attribute-definitions AttributeName=request_id,AttributeType=S \
          --key-schema AttributeName=request_id,KeyType=HASH \
          --billing-mode PAY_PER_REQUEST &&
        echo 'DynamoDB tables ready.'
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # Sale service — Fastify
  # ─────────────────────────────────────────────
  sale-service:
    build:
      context: .
      dockerfile: apps/api/sale-service/Dockerfile
      target: development
    container_name: flashsale-sale-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: local
      PORT: 3001
      DATABASE_URL: postgresql://${POSTGRES_USER:-flashsale}:${POSTGRES_PASSWORD:-flashsale_secret}@postgres:5432/${POSTGRES_DB:-flashsale}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-local_jwt_secret_change_in_prod}
      LOG_LEVEL: debug
    ports:
      - "3001:3001"
    volumes:
      - ./apps/api/sale-service/src:/app/apps/api/sale-service/src
      - ./packages/db/src:/app/packages/db/src
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # Purchase service — Fastify
  # ─────────────────────────────────────────────
  purchase-service:
    build:
      context: .
      dockerfile: apps/api/purchase-service/Dockerfile
      target: development
    container_name: flashsale-purchase-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dynamodb:
        condition: service_healthy
      dynamodb-init:
        condition: service_completed_successfully
      elasticmq:
        condition: service_healthy
    environment:
      NODE_ENV: local
      PORT: 3002
      DATABASE_URL: postgresql://${POSTGRES_USER:-flashsale}:${POSTGRES_PASSWORD:-flashsale_secret}@postgres:5432/${POSTGRES_DB:-flashsale}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      DYNAMO_ENDPOINT: http://dynamodb:8000
      DYNAMO_REGION: us-east-1
      DYNAMO_ACCESS_KEY: local
      DYNAMO_SECRET_KEY: local
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_REGION: us-east-1
      SQS_ACCESS_KEY: local
      SQS_SECRET_KEY: local
      SQS_PURCHASE_QUEUE_URL: http://elasticmq:9324/000000000000/purchases.fifo
      JWT_SECRET: ${JWT_SECRET:-local_jwt_secret_change_in_prod}
      LOG_LEVEL: debug
    ports:
      - "3002:3002"
    volumes:
      - ./apps/api/purchase-service/src:/app/apps/api/purchase-service/src
      - ./packages/db/src:/app/packages/db/src
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3002/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # Admin service — Fastify
  # ─────────────────────────────────────────────
  admin-service:
    build:
      context: .
      dockerfile: apps/api/admin-service/Dockerfile
      target: development
    container_name: flashsale-admin-service
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: local
      PORT: 3003
      DATABASE_URL: postgresql://${POSTGRES_USER:-flashsale}:${POSTGRES_PASSWORD:-flashsale_secret}@postgres:5432/${POSTGRES_DB:-flashsale}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_secret}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-local_jwt_secret_change_in_prod}
      ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-admin@local.dev}
      ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:-admin_secret}
      LOG_LEVEL: debug
    ports:
      - "3003:3003"
    volumes:
      - ./apps/api/admin-service/src:/app/apps/api/admin-service/src
      - ./packages/db/src:/app/packages/db/src
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - flashsale-net

  # ─────────────────────────────────────────────
  # Order worker — SQS consumer
  # ─────────────────────────────────────────────
  order-worker:
    build:
      context: .
      dockerfile: apps/api/order-worker/Dockerfile
      target: development
    container_name: flashsale-order-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      elasticmq:
        condition: service_healthy
    environment:
      NODE_ENV: local
      DATABASE_URL: postgresql://${POSTGRES_USER:-flashsale}:${POSTGRES_PASSWORD:-flashsale_secret}@postgres:5432/${POSTGRES_DB:-flashsale}
      SQS_ENDPOINT: http://elasticmq:9324
      SQS_REGION: us-east-1
      SQS_ACCESS_KEY: local
      SQS_SECRET_KEY: local
      SQS_PURCHASE_QUEUE_URL: http://elasticmq:9324/000000000000/purchases.fifo
      LOG_LEVEL: debug
    volumes:
      - ./apps/api/order-worker/src:/app/apps/api/order-worker/src
      - ./packages/db/src:/app/packages/db/src
    networks:
      - flashsale-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web/src:/app/apps/web/src
    environment:
      - NODE_ENV=development
    depends_on:
      - sale-service
      - purchase-service
      - admin-service
    networks:
      - flashsale-net

volumes:
  postgres_data:
  redis_data:
  dynamodb_data:

networks:
  flashsale-net:
    driver: bridge